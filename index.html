<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Song Recommender</title>
        <style>
            button {
                background-color:rgb(38, 38, 38);
                color:#fff;
                width: 400px;
                height: 50px;
                font-size: 24px;
            }

            button:hover {
                cursor: pointer;
                background-color: rgb(66, 66, 66);
            }

            #genres {
                background-color:rgb(221, 75, 75);
                color:#fff;
                border: 1.5px solid white;
                height: 50px;
                width: 600px;
            }

            .header {
                font-size: 24px; 
                font-family: Arial, Helvetica, sans-serif;
                padding-left: 30px; 
                margin-top: 15px;
                margin-bottom: 15px;
            }

            .hero {
                background-color:rgb(221, 75, 75);
                color: #fff;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 24px;
                height: 270px;
                padding: 30px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <img src="https://github.com/jasondaween.png" alt="GitHub PFP" width="30px">
            <a href="https://github.com/jasondaween" style="text-decoration: none; color:black;">Jason</a>
        </div>
        <div class="hero">
            <h1>Song Recommender</h1>
            <h5>Generate songs based on your favorite music genre</h5>
            <select id="genres" name="genres">
                <option value="" disabled selected hidden>Choose a genre</option>
                <option value="pop">pop</option>
                <option value="rap">rap</option>
                <option value="rock">rock</option>
                <option value="r&b">r&b</option>
            </select>
            <button id="submit">Generate</button>
        </div>
    </body>
</html>
